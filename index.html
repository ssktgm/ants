<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANTS - 配車・出欠最適化システム</title>
  
  <!-- Tailwind CSS & Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind Custom Palette -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'Noto Sans JP', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>

  <!-- カスタムスタイルシートの読み込み -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans flex flex-col selection:bg-brand-500/10 selection:text-brand-600">

  <!-- ==========================================
       1. スマートな状況追従型ローディング画面
       ========================================== -->
  <div id="loading-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center transform scale-95 transition-transform duration-300 flex flex-col items-center">
      <!-- アニメーション付きスピナー -->
      <div class="relative w-16 h-16 mb-6">
        <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
      
      <!-- 動的に変化する進行ステータステキスト -->
      <h3 id="loading-title" class="text-lg font-bold text-slate-800 mb-2">データを読み込んでいます</h3>
      <p id="loading-desc" class="text-xs text-slate-500 mb-6 leading-relaxed">
        しばらくお待ちください...
      </p>

      <!-- タイムアウト時の手動復旧コントロール -->
      <div id="loading-actions" class="hidden w-full flex flex-col gap-2">
        <button onclick="retryConnection()" class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white text-xs font-semibold rounded-lg transition shadow-sm">
          再試行する
        </button>
        <button onclick="location.reload()" class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-medium rounded-lg transition">
          ページを強制更新する
        </button>
      </div>
    </div>
  </div>

  <!-- 通知トーストをストックするコンテナ -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

  <!-- ==========================================
       2. メインヘッダー
       ========================================== -->
  <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-brand-500 text-white rounded-xl shadow-md shadow-brand-500/20">
          <i data-lucide="truck" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">ANTS</h1>
          <span class="text-[10px] font-bold text-brand-500 uppercase tracking-wider">配車・出欠調整</span>
        </div>
      </div>

      <!-- デスクトップ用ナビゲーション (JSにより動的制御) -->
      <nav id="main-nav" class="hidden md:flex items-center gap-1"></nav>

      <!-- ユーザーコントロールメニュー -->
      <div id="user-menu" class="hidden flex items-center gap-4">
        <div class="text-right hidden sm:block">
          <div id="user-display-name" class="text-sm font-semibold text-slate-800">ゲストユーザー</div>
          <div id="user-display-role" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full inline-block mt-0.5">---</div>
        </div>
        <button onclick="handleLogout()" class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition duration-200" title="ログアウト">
          <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- スマホ・タブレット用ボトム固定ナビゲーション (JSにより動的制御) -->
  <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 py-2 flex justify-around items-center z-40 shadow-lg shadow-slate-200/50 hidden"></nav>

  <!-- ==========================================
       3. メインアプリ表示領域
       ========================================== -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 mb-20 md:mb-8">
    <div id="app" class="transition-all duration-300">
      <!-- ログイン、出欠一覧、配車シミュレーション、マスタ画面が動的に描画されます -->
    </div>
  </main>

  <!-- Supabaseと連携するアプリケーションのJavaScript群の読み込み -->
  <script src="attendance.js"></script>
  <script src="main.js"></script>
</body>
</html>
